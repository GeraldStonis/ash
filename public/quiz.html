<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Googly Eyes Quiz Game</title>
  <meta name="description" content="Interactive googly-eyed characters and a cute cursor-dodging quiz game.">
  
  <!-- Premium Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background: #f0edf3; 
      font-family: 'Outfit', sans-serif;
    }

    .scene { position: relative; width: 100%; height: 100%; }

    /* ========== EYE SYSTEM ========== */
    .eye {
      position: absolute;
      background: white;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      z-index: 2;
    }
    .pupil {
      width: 62%; height: 62%;
      background: #111;
      border-radius: 50%;
      position: relative;
      will-change: transform;
      pointer-events: none;
    }
    .pupil::after {
      content: '';
      position: absolute;
      width: 22%; height: 22%;
      background: rgba(255,255,255,0.7);
      border-radius: 50%;
      top: 12%; right: 16%;
    }

    /* ========== STARS ========== */
    .star { position: absolute; pointer-events: none; z-index: 1; }
    .star svg { display: block; }

    /* ========== CHARACTER BASE ========== */
    .character { position: absolute; z-index: 3; }

    /* ========== 1. YELLOW SMILEY ========== */
    .smiley {
      bottom: -8%; right: -6%;
      width: 360px; height: 360px;
      transform: rotate(-10deg);
      position: absolute;
      z-index: 1;
    }
    .smiley-body {
      width: 100%; height: 100%;
      background: radial-gradient(circle at 40% 35%, #ffe14d, #ffc107 50%, #f0a800);
      border-radius: 50%;
      position: relative;
      box-shadow: 0 -8px 40px rgba(255,193,7,0.25);
    }
    .smiley .cheek {
      position: absolute; width: 60px; height: 60px;
      background: radial-gradient(circle, #ff9800, #e68a00);
      border-radius: 50%; top: 180px;
    }
    .smiley .cheek.l { left: 40px; }
    .smiley .cheek.r { right: 40px; }
    .smiley .mouth {
      position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 60px;
      border-bottom: 8px solid #5a3e00;
      border-radius: 0 0 50% 50%;
    }
    .smiley .eye { width: 85px; height: 85px; top: 90px; z-index: 3; }
    .smiley .eye.l { left: 75px; }
    .smiley .eye.r { right: 75px; }
    .smiley .tear { width: 22px; height: 32px; z-index: 4; }
    .smiley .tear.l { left: 95px; top: 155px; }
    .smiley .tear.r { right: 95px; top: 155px; }

    /* ========== 2. PINK MONKEY ========== */
    .monkey { left: 5%; top: 5%; width: 140px; height: 140px; z-index: 2; position: absolute; }
    .monkey-head {
      width: 140px; height: 120px;
      background: radial-gradient(circle at 40% 40%, #ffc0cb, #ff69b4);
      border-radius: 50% 50% 45% 45%;
      position: absolute;
      top: 0; left: 0;
      box-shadow: 0 10px 20px rgba(255, 105, 180, 0.3);
      animation: float2 6s ease-in-out infinite;
    }
    .monkey-ear {
      position: absolute; width: 45px; height: 45px;
      background: #ff69b4; border-radius: 50%;
      top: 25px; z-index: -1;
    }
    .monkey-ear.l { left: -18px; }
    .monkey-ear.r { right: -18px; }
    .monkey-head .eye { width: 44px; height: 44px; top: 30px; z-index: 3; }
    .monkey-head .eye.l { left: 16px; }
    .monkey-head .eye.r { right: 16px; }
    .monkey-head .mouth {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      width: 50px; height: 25px;
      border-bottom: 5px solid #a03c50;
      border-radius: 0 0 50% 50%;
      z-index: 3;
    }
    .monkey-head .tear { width: 12px; height: 18px; z-index: 4; }
    .monkey-head .tear.l { left: 32px; top: 65px; }
    .monkey-head .tear.r { right: 32px; top: 65px; }

    /* ========== 3. ORANGE FLOWER ========== */
    .flower { right: 3%; top: 3%; width: 180px; height: 200px; }
    .flower-body { position: relative; width: 150px; height: 135px; }
    .flower-blob {
      position: absolute; border-radius: 50%;
      background: #e85d04;
    }
    .flower-blob.c { width: 90px; height: 85px; top: 25px; left: 30px; }
    .flower-blob.t { width: 64px; height: 57px; top: 0; left: 43px; }
    .flower-blob.r { width: 57px; height: 64px; top: 28px; left: 93px; }
    .flower-blob.b { width: 64px; height: 57px; top: 78px; left: 39px; }
    .flower-blob.bl { width: 53px; height: 57px; top: 64px; left: 7px; }
    .flower-blob.l { width: 57px; height: 60px; top: 18px; left: 0; }
    .flower-glasses {
      position: absolute; z-index: 3;
    }
    .flower-glasses .lens {
      position: absolute; width: 45px; height: 45px;
      border: 2.5px solid #4a2800;
      border-radius: 50%;
    }
    .flower-glasses .lens.l { top: 38px; left: 25px; }
    .flower-glasses .lens.r { top: 38px; left: 78px; }
    .flower-glasses .bridge {
      position: absolute; width: 10px; height: 2px;
      background: #4a2800;
      top: 60px; left: 69px;
    }
    .flower .eye { width: 32px; height: 32px; z-index: 4; }
    .flower .eye.l { top: 45px; left: 30px; }
    .flower .eye.r { top: 45px; left: 83px; }
    .flower .mouth {
      position: absolute; width: 40px; height: 20px;
      border-bottom: 4px solid #4a2800; border-radius: 0 0 50% 50%;
      top: 85px; left: 55px; z-index: 3;
    }
    .flower .stem {
      position: absolute; width: 42px; height: 70px;
      border: 3px solid #00875a;
      border-radius: 0 0 42px 0;
      border-left: none; border-top: none;
      top: 110px; left: 93px; z-index: 0;
    }

    /* ========== 4. WHITE GHOST CIRCLE ========== */
    .ghost { left: 30%; top: 5%; width: 140px; height: 140px; }
    .ghost-body {
      width: 100%; height: 100%;
      background: radial-gradient(circle at 40% 35%, #ffffff 0%, #e8e4f0 50%, #d4cfe0 100%);
      border-radius: 50%;
      box-shadow: 0 10px 35px rgba(100,80,140,0.12);
      position: relative;
    }
    .ghost .eye { width: 46px; height: 46px; top: 30%; }
    .ghost .eye.l { left: 12%; }
    .ghost .eye.r { right: 12%; }
    .ghost .mouth {
      position: absolute; width: 45px; height: 25px;
      border-bottom: 4px solid #8e8a9c; border-radius: 0 0 50% 50%;
      top: 65%; left: 50%; transform: translateX(-50%); z-index: 3;
    }

    /* ========== 5. BLUE BLOB ========== */
    .blob { left: 4%; top: 35%; width: 130px; height: 160px; }
    .blob-body {
      width: 100%; height: 100%;
      background: linear-gradient(160deg, #5b4cff 0%, #2e28b8 60%, #1a1580 100%);
      border-radius: 45% 50% 42% 48% / 40% 38% 55% 50%;
      position: relative;
      box-shadow: 0 8px 30px rgba(40,30,160,0.2);
    }
    .blob .eye { width: 48px; height: 48px; top: 22%; z-index: 2; }
    .blob .eye.l { left: 8%; }
    .blob .eye.r { right: 8%; }
    .blob .mouth {
      position: absolute; width: 50px; height: 25px;
      border-bottom: 4px solid #0c0836; border-radius: 0 0 50% 50%;
      top: 60%; left: 50%; transform: translateX(-50%); z-index: 3;
    }
    .blob .tear { width: 12px; height: 18px; z-index: 4; }
    .blob .tear.l { left: 28px; top: 65px; }
    .blob .tear.r { right: 28px; top: 65px; }

    /* ========== 6. TEAL ROUNDED RECT ========== */
    .teal { right: 4%; top: 40%; width: 120px; height: 140px; }
    .teal-body {
      width: 100%; height: 100%;
      background: linear-gradient(150deg, #00c9a0 0%, #00b894 40%, #48d6b5 100%);
      border-radius: 28px;
      position: relative;
      transform: rotate(-8deg);
      box-shadow: 0 8px 28px rgba(0,160,120,0.18);
    }
    .teal .eye { width: 45px; height: 45px; top: 26%; z-index: 2; }
    .teal .eye.l { left: 10%; }
    .teal .eye.r { right: 10%; }
    .teal .mouth {
      position: absolute; width: 50px; height: 25px;
      border-bottom: 4px solid #005240; border-radius: 0 0 50% 50%;
      top: 65%; left: 50%; transform: translateX(-50%); z-index: 3;
    }

    /* ========== 7. DARK TRIANGLE ========== */
    .triangle { left: 3%; bottom: 3%; width: 140px; height: 170px; z-index: 2; }
    .triangle-body {
      width: 100%; height: 100%;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      position: relative;
    }
    .triangle .eye {
      width: 40px; height: 36px;
      border-radius: 50%;
      top: 48%; z-index: 2;
      background: #e8e4f0;
    }
    .triangle .eye .pupil { width: 55%; height: 55%; background: #222; }
    .triangle .eye.l { left: 15%; }
    .triangle .eye.r { right: 15%; }
    .triangle .mouth {
      position: absolute; width: 45px; height: 22px;
      border-bottom: 4px solid #8c89a0; border-radius: 0 0 50% 50%;
      top: 72%; left: 50%; transform: translateX(-50%); z-index: 3;
    }

    /* ========== 8. PURPLE STAR ========== */
    .star-char { right: 25%; top: 12%; width: 140px; height: 140px; z-index: 2; position: absolute; }
    .star-char-body {
      width: 100%; height: 100%;
      position: relative;
      animation: float2 5.8s ease-in-out infinite 0.2s;
    }
    .star-char-bg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
      background: #a55eff;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }
    .star-char .eye { width: 38px; height: 38px; top: 55px; z-index: 3; }
    .star-char .eye.l { left: 28px; }
    .star-char .eye.r { right: 28px; }
    .star-char .mouth {
      position: absolute; width: 36px; height: 18px;
      border-bottom: 5px solid #481d7a; border-radius: 0 0 50% 50%;
      top: 85px; left: 50%; transform: translateX(-50%); z-index: 3;
    }

    /* ========== 9. RED BEAN ========== */
    .bean { right: 18%; bottom: 15%; width: 130px; height: 170px; z-index: 2; position: absolute; }
    .bean-body {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #ff4b72 0%, #ff2a55 100%);
      border-radius: 60px 60px 40px 80px / 80px 50px 70px 60px;
      position: relative;
      transform: rotate(15deg);
      box-shadow: 0 8px 25px rgba(255, 75, 114, 0.2);
      animation: float3 4.5s ease-in-out infinite 0.7s;
    }
    .bean .eye { width: 46px; height: 46px; top: 30%; z-index: 3; }
    .bean .eye.l { left: 8%; }
    .bean .eye.r { right: 8%; }
    .bean .mouth {
      position: absolute; width: 45px; height: 22px;
      border-bottom: 4px solid #6e0f24; border-radius: 0 0 50% 50%;
      top: 65%; left: 50%; transform: translateX(-50%); z-index: 3;
    }

    /* ========== 10. GREEN PUFF ========== */
    .puff { left: 22%; bottom: 12%; width: 150px; height: 140px; z-index: 2; position: absolute; }
    .puff-body {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
      border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
      position: relative;
      animation: float1 5.2s ease-in-out infinite 0.9s;
      box-shadow: 0 8px 25px rgba(58, 123, 213, 0.2);
    }
    .puff .eye { width: 44px; height: 44px; top: 35%; z-index: 3; }
    .puff .eye.l { left: 15%; }
    .puff .eye.r { right: 15%; }
    .puff .mouth {
      position: absolute; width: 50px; height: 25px;
      border-bottom: 4px solid #072a5a; border-radius: 0 0 50% 50%;
      top: 68%; left: 50%; transform: translateX(-50%); z-index: 3;
    }

    /* ========== FLOATING ANIMATIONS ========== */
    @keyframes float1 {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    @keyframes float2 {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
    }
    @keyframes float3 {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(3deg); }
    }
    @keyframes twinkle {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
      50% { transform: scale(0.7) rotate(20deg); opacity: 0.6; }
    }

    .ghost { animation: float1 5s ease-in-out infinite; }
    .monkey { animation: float2 6s ease-in-out infinite; }
    .flower { animation: float3 5.5s ease-in-out infinite 0.5s; }
    .blob { animation: float3 4.8s ease-in-out infinite 1s; }
    .teal { animation: float2 5.2s ease-in-out infinite 0.8s; }
    .triangle { animation: float3 6.5s ease-in-out infinite 0.3s; }
    .star { animation: twinkle 3s ease-in-out infinite; }

    /* ========== GAME CARD SYSTEM ========== */
    .card-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      margin: auto;
      height: fit-content;
      width: 600px;
      max-width: 90%;
      z-index: 100;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .question-text {
      font-size: 38px;
      color: #3d2a5e;
      line-height: 1.3;
      margin-bottom: 40px;
      font-weight: 700;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-shadow: 3px 3px 0px rgba(0,0,0,0.06);
    }

    .buttons-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      width: 100%;
    }

    .btn-wrapper {
      width: 140px;
      display: flex;
      justify-content: center;
    }

    .btn {
      padding: 14px 38px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .btn:hover {
      transform: scale(1.04);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-yes {
      background: #5b4cff;
      color: white;
      box-shadow: 0 4px 15px rgba(91, 76, 255, 0.25);
    }

    .btn-yes:hover {
      background: #4738e6;
      box-shadow: 0 6px 20px rgba(91, 76, 255, 0.35);
    }

    .btn-no {
      background: #ff4b72;
      color: white;
      box-shadow: 0 4px 15px rgba(255, 75, 114, 0.25);
    }

    .btn-no:hover {
      background: #e6395e;
      box-shadow: 0 6px 20px rgba(255, 75, 114, 0.35);
    }

    /* Teleport styling to ensure wrong button can jump smoothly */
    .dodging {
      position: fixed !important;
      transition: none !important;
      animation: popJump 0.15s ease-out;
      z-index: 2000 !important;
    }

    @keyframes popJump {
      0% { transform: scale(1); }
      50% { transform: scale(0.8); }
      100% { transform: scale(1); }
    }

    /* ========== GIGGLE ANIMATION ========== */
    .giggle {
      animation: giggleAnim var(--giggle-dur, 0.45s) cubic-bezier(0.36, 0.07, 0.19, 0.97) var(--giggle-delay, 0s) both !important;
    }
    @keyframes giggleAnim {
      0%, 100% { translate: 0 0; rotate: 0deg; scale: 1; }
      15% { translate: 0 -15px; rotate: -6deg; scale: 1.05; }
      30% { translate: 0 -15px; rotate: 6deg; scale: 1.05; }
      45% { translate: 0 -15px; rotate: -6deg; scale: 1.05; }
      60% { translate: 0 -15px; rotate: 6deg; scale: 1.05; }
      75% { translate: 0 -15px; rotate: -3deg; scale: 1.05; }
    }

    .tear {
      position: absolute;
      background: #4cc9f0;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      opacity: 0;
    }
    .giggle .mouth {
      animation: widenSmile var(--giggle-dur, 0.45s) cubic-bezier(0.36, 0.07, 0.19, 0.97) var(--giggle-delay, 0s) both !important;
    }
    .giggle .eye {
      animation: squintEye var(--giggle-dur, 0.45s) cubic-bezier(0.36, 0.07, 0.19, 0.97) var(--giggle-delay, 0s) both !important;
    }
    .giggle .tear {
      animation: cryTear var(--giggle-dur, 0.45s) ease-out var(--giggle-delay, 0s) both !important;
    }
    
    @keyframes widenSmile {
      0%, 100% { transform: translateX(-50%) scaleX(1) scaleY(1); }
      15%, 85% { transform: translateX(-50%) scaleX(1.4) scaleY(1.5); }
    }
    @keyframes squintEye {
      0%, 100% { transform: scaleY(1); }
      15%, 85% { transform: scaleY(0.2) scaleX(1.1); }
    }
    @keyframes cryTear {
      0% { opacity: 0; transform: translateY(-10px) scale(0.5); }
      20% { opacity: 1; transform: translateY(5px) scale(1.2); }
      80% { opacity: 1; transform: translateY(30px) scale(1); }
      100% { opacity: 0; transform: translateY(40px) scale(0.5); }
    }

    /* ========== TEXT BUBBLES ========== */
    .text-bubble {
      position: absolute;
      top: -35px;
      left: 50%;
      transform: translateX(-50%) scale(0);
      background: white;
      color: #333;
      padding: 6px 14px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      z-index: 100;
      white-space: nowrap;
      animation: popBubble 1.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      pointer-events: none;
    }
    .text-bubble::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 6px 6px 0;
      border-style: solid;
      border-color: white transparent transparent transparent;
    }
    @keyframes popBubble {
      0% { transform: translateX(-50%) scale(0); opacity: 0; }
      15% { transform: translateX(-50%) scale(1.1); opacity: 1; }
      30% { transform: translateX(-50%) scale(1); opacity: 1; }
      80% { transform: translateX(-50%) scale(1) translateY(-10px); opacity: 1; }
      100% { transform: translateX(-50%) scale(0) translateY(-20px); opacity: 0; }
    }

    /* Success Card Styling */
    .success-container {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: cardPopIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .success-emoji {
      font-size: 64px;
      margin-bottom: 20px;
      animation: heartBeat 1.2s infinite ease-in-out;
    }

    .success-title {
      font-size: 28px;
      color: #2d1c47;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .success-subtitle {
      font-size: 16px;
      color: #7f6e9b;
      line-height: 1.5;
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    @keyframes cardPopIn {
      0% { opacity: 0; transform: scale(0.9) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Hearts explosion system */
    .heart-burst {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      font-size: 24px;
      will-change: transform, opacity;
      animation: floatHeart 2.5s ease-out forwards;
    }

    @keyframes floatHeart {
      0% {
        transform: translateY(0) scale(0) rotate(0deg);
        opacity: 1;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateY(-120px) scale(1.2) rotate(var(--rot));
        opacity: 0;
      }
    }

    /* ========== RESPONSIVE DESIGN ========== */
    @media (max-width: 768px) {
      .question-text {
        font-size: 26px;
        padding: 0 10px;
        margin-bottom: 25px;
      }
      .buttons-container {
        gap: 15px;
      }
      /* Hide characters that heavily overlap each other or the text on narrow screens */
      .flower, .ghost, .blob, .teal, .bean, .puff {
        display: none !important;
      }
      /* Keep Monkey (Top Left), Triangle (Bottom Left), Smiley (Bottom Right), Star (Top Right) */
      .smiley {
        bottom: -15%; right: -25%;
      }
      .monkey {
        top: 0%; left: -5%;
      }
      .star-char {
        top: 2%; right: -5%;
      }
    }
  </style>
</head>
<body>
<div class="scene" id="scene">

  <!-- ===== STARS ===== -->
  <div class="star" style="left:4%;top:22%;animation-delay:0s">
    <svg width="42" height="42" viewBox="0 0 100 100"><polygon points="50,5 63,38 98,38 70,60 80,95 50,73 20,95 30,60 2,38 37,38" fill="#e84040"/></svg>
  </div>
  <div class="star" style="left:50%;top:5%;animation-delay:0.5s">
    <svg width="36" height="36" viewBox="0 0 100 100"><polygon points="50,5 63,38 98,38 70,60 80,95 50,73 20,95 30,60 2,38 37,38" fill="#e84040"/></svg>
  </div>
  <div class="star" style="left:13%;top:85%;animation-delay:1.2s">
    <svg width="34" height="34" viewBox="0 0 100 100"><polygon points="50,5 63,38 98,38 70,60 80,95 50,73 20,95 30,60 2,38 37,38" fill="#e84848"/></svg>
  </div>
  <div class="star" style="left:63%;top:57%;animation-delay:0.8s">

<script>
  // ========== QUESTIONS ARRAY ==========
  const questions = [
    { text: "Do you like this website I made for you?", correct: "yes" },
    { text: "Do you think you are funnier than me?", correct: "no" },
    { text: "Would you apologize/forgive first without asking even when you're angry or mad?", correct: "yes" },
    { text: "Do you desperately want to be my gf?", correct: "yes" },
    { text: "Would you rate me a 10/10?", correct: "yes" },
    { text: "Would you wear the maid dress?<br><small style='font-size: 13px; font-weight: normal; opacity: 0.75;'>(I won't have to wear it ever)</small>", correct: "yes" },
    { text: "Would you stop insulting or humiliating me, and start treating me with respect from now on?", correct: "yes" },
    { text: "This is fun. lol. Are you enjoying this?", correct: "yes" },
    { text: "Am I the best person ever?", correct: "yes" },
    { text: "Would you ever threaten to slap or hit me again?", correct: "no" },
    { text: "Would you let me choose your outfit for a day?", correct: "yes" },
    { text: "Would you ever go to bed without saying good night to me?", correct: "no" },
    { text: "Do you accept me as your lord and saviour?", correct: "yes" },
    { text: "Are you my cute lil cupcake?", correct: "yes" },
    { text: "Would you ever let a day go by without texting me from now onwards?", correct: "no" }
  ];

  let currentQuestionIndex = 0;
  let wrongClicks = 0;
  const wrongSound = new Audio('fahhh_KcgAXfs.mp3');
  const correctSound = new Audio('yeah-boymp4.mp3');

  const questionText = document.getElementById('question-text');
  const yesBtn = document.getElementById('yes-btn');
  const noBtn = document.getElementById('no-btn');
  const gameContent = document.getElementById('game-content');
  const successScreen = document.getElementById('success-screen');

  // Load current question
  function loadQuestion() {
    resetButtonPositions();
    
    const currentQuestion = questions[currentQuestionIndex];
    questionText.innerHTML = currentQuestion.text;

    // Remove previous event listeners
    yesBtn.onclick = null;
    noBtn.onclick = null;

    // Attach listeners based on correct answer
    if (currentQuestion.correct === 'yes') {
      // Yes is correct
      yesBtn.onclick = handleCorrectAnswer;
      
      // No is wrong, should dodge only on full click
      noBtn.onclick = (e) => { e.preventDefault(); handleWrongHover(); };
    } else {
      // No is correct
      noBtn.onclick = handleCorrectAnswer;
      
      // Yes is wrong, should dodge only on full click
      yesBtn.onclick = (e) => { e.preventDefault(); handleWrongHover(); };
    }
  }

  function handleCorrectAnswer() {
    correctSound.currentTime = 0;
    correctSound.play().catch(err => console.log("Audio play prevented:", err));
    
    wrongClicks = 0;
    currentQuestionIndex++;
    if (currentQuestionIndex < questions.length) {
      loadQuestion();
    } else {
      showSuccess();
    }
  }

  function triggerGiggle() {
    const characters = document.querySelectorAll('.character');
    characters.forEach(char => {
      char.classList.remove('giggle');
      
      const duration = (Math.random() * 0.4 + 0.3).toFixed(2); // 0.3s to 0.7s
      const delay = (Math.random() * 0.35).toFixed(2); // 0s to 0.35s
      
      char.style.setProperty('--giggle-dur', `${duration}s`);
      char.style.setProperty('--giggle-delay', `${delay}s`);
      
      void char.offsetWidth; // Trigger reflow to restart animation
      char.classList.add('giggle');
    });
  }

  function triggerTextBubbles() {
    if (wrongClicks <= 5) return;
    
    let textOptions = ["lol", "lmao", "lolz", "hehe", "haha", "hehehe"];
    if (wrongClicks > 10) {
      textOptions = ["give up jeez"];
    }

    const characters = document.querySelectorAll('.character');
    const shuffled = Array.from(characters).sort(() => 0.5 - Math.random());
    const selected = shuffled.slice(0, 3 + Math.floor(Math.random() * 2));

    selected.forEach(char => {
      const bubble = document.createElement('div');
      bubble.className = 'text-bubble';
      bubble.textContent = textOptions[Math.floor(Math.random() * textOptions.length)];
      
      const offsetX = (Math.random() * 40 - 20).toFixed(0);
      bubble.style.left = `calc(50% + ${offsetX}px)`;
      
      char.appendChild(bubble);
      
      setTimeout(() => {
        bubble.remove();
      }, 1600);
    });
  }

  function handleWrongHover(e) {
    wrongSound.currentTime = 0;
    wrongSound.play().catch(err => console.log("Audio play prevented:", err));
    
    wrongClicks++;
    triggerGiggle();
    triggerTextBubbles();

    const wrongBtn = questions[currentQuestionIndex].correct === 'yes' ? noBtn : yesBtn;
    
    const btnWidth = wrongBtn.offsetWidth || 110;
    const btnHeight = wrongBtn.offsetHeight || 50;
    
    // Safety padding from screen boundaries
    const padding = 80;
    const maxX = window.innerWidth - btnWidth - padding;
    const maxY = window.innerHeight - btnHeight - padding;
    
    let randomX, randomY;
    let distance = 0;
    let attempts = 0;
    
    // Ensure the new teleport coordinate is not directly under the user's cursor
    do {
      randomX = Math.max(padding, Math.floor(Math.random() * maxX));
      randomY = Math.max(padding, Math.floor(Math.random() * maxY));
      
      const dist = Math.hypot(randomX + btnWidth/2 - mouseX, randomY + btnHeight/2 - mouseY);
      distance = dist;
      attempts++;
    } while (distance < 180 && attempts < 50);
    
    wrongBtn.classList.add('dodging');
    wrongBtn.style.left = `${randomX}px`;
    wrongBtn.style.top = `${randomY}px`;
  }

  function resetButtonPositions() {
    yesBtn.classList.remove('dodging');
    yesBtn.style.left = '';
    yesBtn.style.top = '';
    
    noBtn.classList.remove('dodging');
    noBtn.style.left = '';
    noBtn.style.top = '';
  }

  function showSuccess() {
    gameContent.style.display = 'none';
    successScreen.style.display = 'flex';
    
    // Trigger loop of floating hearts
    setInterval(createHeart, 250);
  }

  function createHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart-burst';
    heart.innerText = ['💖', '❤️', '💕', '💘', '🥰'][Math.floor(Math.random() * 5)];
    heart.style.left = `${Math.random() * 100}vw`;
    heart.style.top = `${Math.random() * 50 + 50}vh`; // Spawn in bottom half
    heart.style.setProperty('--rot', `${Math.random() * 90 - 45}deg`);
    
    // Random sizes
    const size = Math.random() * 20 + 20;
    heart.style.fontSize = `${size}px`;
    
    document.body.appendChild(heart);
    
    setTimeout(() => {
      heart.remove();
    }, 2500);
  }

  // ========== GOOGLY EYE TRACKING ==========
  const scene = document.getElementById('scene');
  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  let rafId = null;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    if (!rafId) {
      rafId = requestAnimationFrame(updateAllEyes);
    }
  });

  document.addEventListener('touchmove', (e) => {
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
    if (!rafId) {
      rafId = requestAnimationFrame(updateAllEyes);
    }
  }, { passive: true });

  function updateAllEyes() {
    rafId = null;
    const eyes = document.querySelectorAll('.eye');

    eyes.forEach(eye => {
      const pupil = eye.querySelector('.pupil');
      if (!pupil) return;

      const rect = eye.getBoundingClientRect();
      const eyeCenterX = rect.left + rect.width / 2;
      const eyeCenterY = rect.top + rect.height / 2;

      const angle = Math.atan2(mouseY - eyeCenterY, mouseX - eyeCenterX);
      const dist = Math.hypot(mouseX - eyeCenterX, mouseY - eyeCenterY);

      const eyeRadius = rect.width / 2;
      const pupilRadius = pupil.offsetWidth / 2;
      const maxOffset = eyeRadius - pupilRadius - 1;

      const normalizedDist = Math.min(dist / 120, 1);
      const offset = normalizedDist * maxOffset;

      const tx = Math.cos(angle) * offset;
      const ty = Math.sin(angle) * offset;

      pupil.style.transform = `translate(${tx}px, ${ty}px)`;
    });
  }

  // Initial load
  loadQuestion();
  updateAllEyes();
</script>
